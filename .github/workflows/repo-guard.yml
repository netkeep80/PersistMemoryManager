name: repo-guard policy check

on:
  # Issue #371: in pull requests, only re-run on actual commits (and the
  # initial open) so that adding a comment, reopening, or marking ready for
  # review does not retrigger CI/CD.
  pull_request:
    types: [opened, synchronize]
    branches: ["**"]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  policy-check:
    name: repo-guard blocking check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run repo-guard
        id: repo_guard
        uses: netkeep80/repo-guard@b1b6756639092bbd4ff6a473aeaa637a63475a86
        with:
          mode: check-pr
          enforcement: blocking
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish repo-guard summary
        if: always()
        run: |
          echo "repo-guard result: ${{ steps.repo_guard.outputs.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.repo_guard.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"

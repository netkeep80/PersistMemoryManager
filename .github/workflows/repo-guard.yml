name: repo-guard policy check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["**"]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  policy-check:
    name: repo-guard advisory check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run repo-guard
        id: repo_guard
        uses: netkeep80/repo-guard@c8491872866c33e0ecd04f809dcfd0489047d13f
        with:
          mode: check-pr
          enforcement: advisory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish repo-guard summary
        if: always()
        run: |
          echo "repo-guard result: ${{ steps.repo_guard.outputs.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.repo_guard.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"

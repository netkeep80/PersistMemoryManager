name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
      - ".gitkeep"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
      - ".gitkeep"

jobs:
  # ─── Code formatting check ───────────────────────────────────────────────────
  format:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find . \( -name '*.cpp' -o -name '*.h' \) \
            ! -path './third_party/*' \
            ! -path './include/pmm_*.h' \
            ! -path './single_include/*' \
            -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # ─── Static analysis ─────────────────────────────────────────────────────────
  static-analysis:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        # Issue #235: suppression rationale:
        #   missingIncludeSystem  — system headers not shipped with the repo
        #   unmatchedSuppression  — keeps CI green when cppcheck version changes
        #   throwInNoexceptFunction — Catch2 REQUIRE macros may throw in noexcept test wrappers
        #   uninitMemberVarPrivate — false positive on in-class member initializers (C++20)
        run: |
          cppcheck \
            --enable=warning,performance \
            --std=c++20 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=throwInNoexceptFunction \
            --suppress=uninitMemberVarPrivate \
            -I . -I utils \
            $(find . -name '*.cpp' ! -path './third_party/*')

  # ─── File size limits ─────────────────────────────────────────────────────────
  file-size:
    name: File size check (<= 1500 lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file size limits
        run: |
          MAX_LINES=1500
          FAILED=0
          while IFS= read -r -d '' file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt "$MAX_LINES" ]; then
              echo "FAIL: $file has $lines lines (max $MAX_LINES)"
              FAILED=1
            fi
          done < <(find . \( -name '*.cpp' -o -name '*.h' \) \
            ! -path './third_party/*' \
            ! -path './include/pmm_*.h' \
            ! -path './single_include/*' \
            -print0)
          exit $FAILED

  # ─── Build and test ──────────────────────────────────────────────────────────
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
            coverage: true
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
            coverage: false
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Release
            coverage: false
          - os: windows-latest
            compiler: msvc
            cc: cl
            cxx: cl
            build_type: Release
            coverage: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (Linux / macOS, without coverage)
        if: runner.os != 'Windows' && !matrix.coverage
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Configure CMake (Linux, with coverage)
        if: runner.os != 'Windows' && matrix.coverage
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-update=atomic" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-update=atomic"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Generate coverage report
        if: matrix.coverage
        run: |
          sudo apt-get install -y lcov
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,source
          lcov --remove coverage.info \
            '/usr/*' '*/third_party/*' '*/catch2-build/*' \
            --output-file coverage.info \
            --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false

  # ─── Sanitizer builds (Issue #235: ASan+UBSan, TSan) ────────────────────────
  sanitizers:
    name: ${{ matrix.sanitizer }} / ${{ matrix.compiler }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            sanitizer: ASan+UBSan
            cmake_flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            sanitizer: ASan+UBSan
            cmake_flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            sanitizer: TSan
            cmake_flags: "-fsanitize=thread -fno-omit-frame-pointer"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_CXX_FLAGS="${{ matrix.cmake_flags }}" \
            -DCMAKE_C_FLAGS="${{ matrix.cmake_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.cmake_flags }}"

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure

  # ─── Single-header freshness check ──────────────────────────────────────────
  single-headers:
    name: Single-header presets up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install quom
        run: pip install quom

      - name: Regenerate single-header presets
        run: bash scripts/generate-single-headers.sh --strip-comments --output-dir /tmp/generated

      - name: Check generated files match committed files
        run: |
          FAILED=0
          # Check pmm.h (the full library without preset specializations)
          committed="single_include/pmm/pmm.h"
          generated="/tmp/generated/pmm.h"
          if ! diff -q "$committed" "$generated" > /dev/null 2>&1; then
            echo "FAIL: $committed is out of date — run scripts/generate-single-headers.sh"
            diff "$committed" "$generated" || true
            FAILED=1
          else
            echo "OK: $committed is up to date"
          fi
          # Check pmm_no_comments.h (comment-stripped variant)
          committed="single_include/pmm/pmm_no_comments.h"
          generated="/tmp/generated/pmm_no_comments.h"
          if ! diff -q "$committed" "$generated" > /dev/null 2>&1; then
            echo "FAIL: $committed is out of date — run scripts/generate-single-headers.sh --strip-comments"
            diff "$committed" "$generated" || true
            FAILED=1
          else
            echo "OK: $committed is up to date"
          fi
          # Check all thin preset specialization files
          for preset in pmm_single_threaded_heap pmm_multi_threaded_heap \
                        pmm_embedded_heap pmm_industrial_db_heap \
                        pmm_embedded_static_heap pmm_small_embedded_static_heap \
                        pmm_large_db_heap; do
            committed="single_include/pmm/${preset}.h"
            generated="/tmp/generated/${preset}.h"
            if ! diff -q "$committed" "$generated" > /dev/null 2>&1; then
              echo "FAIL: $committed is out of date — run scripts/generate-single-headers.sh"
              diff "$committed" "$generated" || true
              FAILED=1
            else
              echo "OK: $committed is up to date"
            fi
          done
          exit $FAILED

  # ─── Changelog fragment check ────────────────────────────────────────────────
  changelog:
    name: Changelog fragment check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changelog fragment
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check-changelog-fragment.sh

  # ─── Demo build ──────────────────────────────────────────────────────────────
  build-demo:
    name: Build Demo (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cmake-fetchcontent
          key: ${{ runner.os }}-demo-fetchcontent-${{ hashFiles('CMakeLists.txt', 'demo/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-demo-fetchcontent-

      - name: Install OpenGL dev (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPMM_BUILD_DEMO=ON \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cmake-fetchcontent

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPMM_BUILD_DEMO=ON -DFETCHCONTENT_BASE_DIR="${{ github.workspace }}\\.cmake-fetchcontent"

      - name: Build
        run: cmake --build build --config Release

      - name: Test (all 23 tests)
        run: ctest --test-dir build --build-config Release --output-on-failure
